<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI勉強会のお知らせ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --accent: #5c6df4;
        --accent-soft: #eef0ff;
        --text: #1f2933;
        --muted: #55606d;
        --card-bg: #ffffff;
        --bg: linear-gradient(135deg, #f9fafc 0%, #eef2ff 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 16px;
        color: var(--text);
      }

      .announcement-card {
        width: min(960px, 100%);
        background: var(--card-bg);
        border-radius: 28px;
        box-shadow: 0 32px 60px rgba(92, 109, 244, 0.18);
        overflow: hidden;
        border: 1px solid rgba(92, 109, 244, 0.12);
      }

      .hero-image {
        position: relative;
        aspect-ratio: 16 / 9;
        background: linear-gradient(rgba(28, 35, 70, 0.25), rgba(28, 35, 70, 0.55)),
          url('https://images.unsplash.com/photo-1526379095098-d400fd0bf935?auto=format&fit=crop&w=1600&q=80')
            center/cover;
      }

      .hero-badge {
        position: absolute;
        top: 24px;
        left: 24px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border-radius: 999px;
        padding: 8px 20px;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .hero-badge svg {
        width: 16px;
        height: 16px;
      }

      .content {
        padding: 40px clamp(24px, 4vw, 56px) 48px;
      }

      .content h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1.15;
        letter-spacing: -0.02em;
      }

      .content p {
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .info-grid {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .info-item {
        background: var(--accent-soft);
        border-radius: 20px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .info-item h2 {
        margin: 0;
        font-size: 1rem;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .info-item p {
        margin: 0;
        color: var(--text);
        font-size: 1.1rem;
        font-weight: 600;
        line-height: 1.4;
      }

      @media (max-width: 640px) {
        body {
          padding: 32px 16px;
        }

        .content {
          padding: 32px 24px 40px;
        }

        .hero-badge {
          top: 16px;
          left: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="announcement-card">
      <div class="hero-image">
        <div class="hero-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path
              d="M7 4v8a5 5 0 1 0 5-5h-8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Learning Together
        </div>
      </div>
      <div class="content">
        <h1>社内AI勉強会 2024</h1>
        <p>
          社内横断の知見共有の場として、AIの最新動向から現場での活用事例までをカバーする勉強会を開催します。気軽に参加して、未来の業務を一緒にデザインしましょう。
        </p>
        <div class="info-grid">
          <article class="info-item">
            <h2>タイトル</h2>
            <p>「AIで変わる仕事のカタチ」</p>
          </article>
          <article class="info-item">
            <h2>開催日時</h2>
            <p>2024年7月18日（木） 15:00 - 17:00</p>
          </article>
          <article class="info-item">
            <h2>場所</h2>
            <p>本社カンファレンスルーム A</p>
          </article>
        </div>
      </div>
    </main>
  </body>
</html>
